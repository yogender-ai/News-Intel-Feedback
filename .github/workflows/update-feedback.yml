name: Live Community Wall Updater

on:
  issues:
    types: [opened, edited, deleted, closed, reopened, labeled, unlabeled]

permissions:
  contents: write

jobs:
  update-feedback-wall:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Run Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          # Only commit if README.md has changed
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update community feedback wall"
          git push
